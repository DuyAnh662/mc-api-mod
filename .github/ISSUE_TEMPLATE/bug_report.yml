name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: A clear and concise description of the bug
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mod Version
      description: Check `mods` screen or the jar filename
      placeholder: e.g. v1.2.0
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      description: e.g. 1.20.1, 1.21
      placeholder: 1.20.1
    validations:
      required: true

  - type: input
    id: loader
    attributes:
      label: Mod Loader & Version
      description: e.g. Fabric Loader 0.15.0
      placeholder: Fabric Loader 0.15.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste console logs, crash reports, or attach screenshots
      placeholder: Paste logs here or drag screenshots
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Start server with '...'
        2. Send POST /action with '...'
        3. See error
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have tested without other mods (vanilla + MC-API only)
          required: false
