<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC-API Mod Documentation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='55,5 25,55 45,55 35,95 75,40 55,40 65,5' fill='%23ffffff'/></svg>">
<style>
:root{--bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#666666;--accent:#ffffff;--accent2:#2a2a2a;--accent3:#555555;--border:#222222;--hover:#1a1a1a;--code-bg:#0e0e0e;--code-border:#1a1a1a;--sidebar-w:280px;--toc-w:220px;--header-h:56px;--font:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace}
[data-theme="light"]{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;--text:#1a1a1a;--text2:#666666;--text3:#999999;--accent:#000000;--accent2:#d4d4d4;--accent3:#aaaaaa;--border:#d4d4d4;--hover:#f0f0f0;--code-bg:#fafafa;--code-border:#e0e0e0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:calc(var(--header-h) + 24px)}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;overflow-x:hidden}
a{color:var(--text);text-decoration:none;transition:all .15s;border-bottom:1px solid transparent}
a:hover{color:var(--text);border-bottom-color:var(--text3)}
h1{font-size:2rem;font-weight:700;margin:0 0 .75rem 0;letter-spacing:-.025em;line-height:1.3}
h2{font-size:1.45rem;font-weight:600;margin:2.5rem 0 .75rem 0;padding-bottom:.3rem;border-bottom:1px solid var(--border);letter-spacing:-.01em}
h3{font-size:1.15rem;font-weight:600;margin:1.75rem 0 .5rem 0}
h4{font-size:1rem;font-weight:600;margin:1.25rem 0 .4rem 0}
h2[id],h3[id],h4[id]{cursor:pointer;position:relative}
h2[id]:hover::before,h3[id]:hover::before,h4[id]:hover::before{content:'#';position:absolute;margin-left:-1em;color:var(--text3);opacity:.6;font-weight:400}
p{margin:0 0 1rem 0}
ul,ol{margin:0 0 1rem 0;padding-left:1.5rem}
li{margin:.25rem 0}
code{font-family:var(--mono);background:var(--code-bg);padding:2px 6px;border-radius:4px;font-size:.875em;color:var(--text2);border:1px solid var(--code-border)}
pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:8px;padding:16px;overflow-x:auto;margin:0 0 1rem 0;position:relative}
pre code{background:transparent;padding:0;font-size:.85em;color:var(--text);border:none}
table{width:100%;border-collapse:collapse;margin:0 0 1rem 0;font-size:.925em}
th,td{border:1px solid var(--border);padding:8px 12px;text-align:left}
th{background:var(--bg2);font-weight:600}
tr:hover{background:var(--hover)}
blockquote{border-left:3px solid var(--text3);padding:8px 16px;margin:0 0 1rem 0;background:var(--bg2);border-radius:0 6px 6px 0;color:var(--text2);font-size:.95em}
blockquote p{margin:0}
hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(10,10,10,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:8px}
[data-theme="light"] .header{background:rgba(255,255,255,.85)}
.header-logo{font-weight:700;font-size:1rem;color:var(--text);display:flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer;margin-right:12px;text-decoration:none}
.header-logo:hover{opacity:.7;text-decoration:none}
.header-logo svg{width:22px;height:22px;flex-shrink:0}
.header-search{flex:1;max-width:420px;position:relative}
.header-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.875rem;outline:none;transition:border .2s,background .2s}
.header-search input:focus{border-color:var(--text2);background:var(--bg2)}
.header-search input::placeholder{color:var(--text3)}
.header-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.header-actions{display:flex;gap:4px;align-items:center;margin-left:auto}
.icon-btn{background:transparent;border:none;color:var(--text2);cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:1rem;text-decoration:none}
.icon-btn:hover{color:var(--text);background:var(--hover)}
.icon-btn svg{width:20px;height:20px}
.lang-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .15s;white-space:nowrap}
.lang-btn:hover{color:var(--text);border-color:var(--text2);background:var(--hover)}
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:50;padding:8px 0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-section{margin:2px 0}
.sidebar-head{display:flex;align-items:center;gap:6px;padding:7px 16px;cursor:pointer;font-weight:600;font-size:.78rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;transition:color .15s;user-select:none}
.sidebar-head:hover{color:var(--text2)}
.sidebar-head svg{width:14px;height:14px;flex-shrink:0;opacity:.6}
.sidebar-head .arrow{font-size:.55rem;margin-left:auto;transition:transform .2s;opacity:.5}
.sidebar-head .arrow.open{transform:rotate(90deg)}
.sidebar-items{overflow:hidden;max-height:0;transition:max-height .22s ease}
.sidebar-items.open{max-height:3000px}
.sidebar-item{display:block;padding:5px 16px 5px 28px;font-size:.85rem;color:var(--text2);cursor:pointer;transition:all .12s;border-left:2px solid transparent;text-decoration:none;border-radius:0 4px 4px 0}
.sidebar-item:hover{color:var(--text);background:var(--hover)}
.sidebar-item.active{color:var(--text);border-left-color:var(--text);background:var(--hover)}
.main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:40px 56px;max-width:840px;min-height:calc(100vh - var(--header-h))}
.toc-sidebar{position:fixed;top:var(--header-h);right:0;bottom:0;width:var(--toc-w);padding:24px 12px 24px 8px;overflow-y:auto;z-index:40;display:none}
.toc-sidebar::-webkit-scrollbar{width:3px}
.toc-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.toc-sidebar.visible{display:block}
.toc-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px;padding-left:8px}
.toc-link{display:block;padding:4px 8px;font-size:.78rem;color:var(--text3);border-left:2px solid transparent;transition:all .12s;text-decoration:none;line-height:1.4}
.toc-link:hover{color:var(--text2)}
.toc-link.active{color:var(--text);border-left-color:var(--text)}
.toc-link.h3{padding-left:20px;font-size:.74rem}
.toc-link.h4{padding-left:32px;font-size:.72rem}
.page-footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.page-nav{display:flex;justify-content:space-between;gap:16px;margin-bottom:1rem}
.page-nav a{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:.85rem;transition:all .15s;text-decoration:none}
.page-nav a:hover{color:var(--text);border-color:var(--text2);background:var(--hover)}
.page-nav .nav-next{margin-left:auto}
.page-footer-links{display:flex;gap:16px;align-items:center;font-size:.82rem;color:var(--text3);flex-wrap:wrap}
.page-footer-links a{color:var(--text3);display:inline-flex;align-items:center;gap:4px;border-bottom:none}
.page-footer-links a:hover{color:var(--text);border-bottom:none}
.alert{padding:12px 16px;border-radius:8px;margin:0 0 1rem 0;font-size:.93em;line-height:1.5}
.alert-info{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.alert-warn{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.alert-danger{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.alert-success{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.param-table td:first-child{font-family:var(--mono);font-size:.9em;white-space:nowrap;color:var(--text2)}
.param-table td:nth-child(2){font-size:.9em;color:var(--text2)}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.72rem;opacity:0;transition:opacity .15s}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:500;margin-right:4px;vertical-align:middle;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.endpoint{margin:1rem 0;padding:10px 14px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);transition:border-color .15s}
.endpoint:hover{border-color:var(--text2)}
.endpoint-url{font-family:var(--mono);font-size:.95rem;font-weight:600;color:var(--text)}
.endpoint-desc{font-size:.85rem;color:var(--text2);margin-top:2px}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.search-overlay.open{display:flex}
.search-modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:580px;max-width:92vw;max-height:65vh;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.search-modal input{width:100%;padding:14px 16px;border:none;background:transparent;color:var(--text);font-size:.95rem;outline:none;border-bottom:1px solid var(--border);font-family:var(--font)}
.search-modal input::placeholder{color:var(--text3)}
.search-results{overflow-y:auto;max-height:55vh}
.search-result{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.search-result:last-child{border-bottom:none}
.search-result:hover{background:var(--hover)}
.search-result-title{font-weight:600;color:var(--text);font-size:.9rem}
.search-result-path{font-size:.75rem;color:var(--text3);margin-top:2px}
.search-result-preview{font-size:.82rem;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-highlight{background:var(--text3);border-radius:2px;padding:0 2px;color:var(--bg)}
.mobile-nav{display:none}
.sidebar-overlay{display:none}
@media(max-width:1100px){
.toc-sidebar{display:none!important}
.main{margin-right:0}
}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:150;box-shadow:4px 0 24px rgba(0,0,0,.5)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149}
.sidebar-overlay.open{display:block}
.main{margin-left:0;padding:24px 16px;max-width:100%}
.mobile-nav{display:flex;align-items:center;gap:4px}
.mobile-nav button{background:transparent;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer;padding:4px;border-radius:4px;line-height:1}
.mobile-nav button:hover{background:var(--hover);color:var(--text)}
.header-search{max-width:32px}
.header-search input{width:32px;padding:7px;cursor:pointer}
.header-search input:focus{width:200px;position:absolute;right:0;top:0}
.header-search input::placeholder{opacity:0}
.header-search svg{left:8px}
.lang-btn{font-size:.7rem;padding:4px 6px}
}
@media print{
.sidebar,.header,.toc-sidebar,.copy-btn,.icon-btn,.lang-btn,.search-overlay,.page-nav,.page-footer-links{display:none!important}
.main{margin:0;padding:0;max-width:100%}
body{background:#fff;color:#000}
pre,code{background:#f5f5f5!important}
}
</style>
</head>
<body>

</header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div id="sidebarContent"></div>
</nav>

<aside class="toc-sidebar" id="tocSidebar">
  <div id="tocContent"></div>
</aside>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <input type="text" id="searchModalInput" placeholder="Search documentation..." onkeyup="searchDocs(event)" autofocus>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<main class="main" id="mainContent">
  <div id="contentContainer"></div>
</main>
<script>
let lang='en',theme='dark',currentPage='home',searchTerm='',navHistory=[];
const T=document.querySelector('[data-theme]'),SI=document.getElementById('searchInput'),SMI=document.getElementById('searchModalInput'),SO=document.getElementById('searchOverlay'),SR=document.getElementById('searchResults'),CC=document.getElementById('contentContainer'),SC=document.getElementById('sidebarContent'),TC=document.getElementById('tocContent'),LB=document.getElementById('langBtn'),TB=document.getElementById('themeBtn');

function qs(s){return document.querySelector(s)}
function qsa(s){return document.querySelectorAll(s)}

// Load saved preferences
try{
const t=localStorage.getItem('mcapi-theme');if(t){theme=t;T.setAttribute('data-theme',theme)}
const l=localStorage.getItem('mcapi-lang');if(l&&l!=='null')lang=l
}catch(e){}
LB.textContent=lang==='en'?'VIỆT':'EN';

function toggleTheme(){theme=theme==='dark'?'light':'dark';T.setAttribute('data-theme',theme);try{localStorage.setItem('mcapi-theme',theme)}catch(e){}}
function toggleLang(){lang=lang==='en'?'vi':'en';LB.textContent=lang==='en'?'VIỆT':'EN';try{localStorage.setItem('mcapi-lang',lang)}catch(e){};renderPage(currentPage)}
function t(key){return translations[lang]&&translations[lang][key]||translations.en[key]||key}
function h(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML}

// ====== TRANSLATIONS ======
const translations={en:{home:'Home',guide:'Guide',api:'API Reference',schema:'Schema',ai:'AI Agent',registry:'Registry',changelog:'Changelog',search:'Search...',prevPage:'Previous',nextPage:'Next',editPage:'Edit this page',viewSource:'View source',onGitHub:'on GitHub',builtWith:'Built with',docsHome:'Documentation Home',gettingStarted:'Getting Started',apiReference:'API Reference',observationSchema:'Observation Schema',aiAgentGuide:'AI Agent Guide',registryReference:'Registry Reference',quickStart:'Quick Start',coreFeatures:'Core Features',restApi:'REST API',webSocket:'WebSocket',events:'Events',dataFormats:'Data Formats',examples:'Examples',troubleshooting:'Troubleshooting',sidebarToggle:'Toggle sidebar',themeToggle:'Toggle theme',languageToggle:'Toggle language',searchDocs:'Search documentation',noResults:'No results found',typeToSearch:'Type to search...',homeTitle:'MC-API Mod Documentation',homeSubtitle:'Complete API documentation for the MC-API Fabric mod — REST API, WebSocket, observations, and AI agent integration.',homeGetStarted:'Get Started',homeViewApi:'View API Reference',homeWhatsNew:'What\'s New',homeWhatsNewDesc:'Latest features, changes, and improvements to MC-API.',homeQuickStartTitle:'Quick Start',homeQuickStartDesc:'Get up and running with MC-API in minutes.',homeExamplesTitle:'Examples',homeExamplesDesc:'Practical examples and use cases.',section:'Section'},vi:{home:'Trang chủ',guide:'Hướng dẫn',api:'API Tham khảo',schema:'Schema',ai:'AI Agent',registry:'Registry',changelog:'Nhật ký thay đổi',search:'Tìm kiếm...',prevPage:'Trang trước',nextPage:'Trang sau',editPage:'Sửa trang này',viewSource:'Xem mã nguồn',onGitHub:'trên GitHub',builtWith:'Xây dựng với',docsHome:'Tài liệu chính',gettingStarted:'Bắt đầu',apiReference:'API Tham khảo',observationSchema:'Schema Quan sát',aiAgentGuide:'Hướng dẫn AI Agent',registryReference:'Registry Tham khảo',quickStart:'Khởi động nhanh',coreFeatures:'Tính năng chính',restApi:'REST API',webSocket:'WebSocket',events:' // ====== RENDER SIDEBAR ======
function renderSidebar(activeId){
let html='',count=0;
sidebarSections.forEach(s=>{
const labelKey=s.key==='home'?'home':s.key;
const sectionLabel=t(labelKey);
const hasActive=s.pages.some(p=>p.id===activeId);
html+='<div class="sidebar-section">';
html+='<div class="sidebar-head" onclick="toggleSection(this)">'+s.icon+'<span>'+h(sectionLabel)+'</span><span class="arrow'+(hasActive?' open':'')+'">▸</span></div>';
html+='<div class="sidebar-items'+(hasActive?' open':'')+'">';
s.pages.forEach(p=>{
const label=lang==='en'?p.labelEN:p.labelVI;
const activeCls=p.id===activeId?' active':'';
html+='<a class="sidebar-item'+activeCls+'" href="#" onclick="navigate(\''+p.id+'\');return false">'+h(label)+'</a>';
count++;
});
html+='</div></div>';
});
SC.innerHTML=html;
}

function toggleSection(el){
const arrow=el.querySelector('.arrow'),items=el.nextElementSibling;
arrow.classList.toggle('open');items.classList.toggle('open');
}

// ====== RENDER PAGE ======
function renderPage(pageId){
currentPage=pageId;
const content=getContent(lang,pageId);
if(!content){CC.innerHTML='<h2>Page not found</h2><p>The page "'+h(pageId)+'" does not exist.</p>';renderSidebar(pageId);renderToc(pageId,[]);return}
CC.innerHTML=content;
renderSidebar(pageId);
renderToc(pageId,content);
window.scrollTo({top:0,behavior:'auto'});
// Update nav history
if(navHistory.length===0||navHistory[navHistory.length-1]!==pageId)navHistory.push(pageId);
// Update URL hash
history.replaceState(null,'','#'+pageId);
}

// ====== RENDER TOC ======
function renderToc(pageId,content){
const headings=[];
const tmp=document.createElement('div');tmp.innerHTML=content;
tmp.querySelectorAll('h2,h3,h4').forEach(h=>{
const id=h.getAttribute('id');
if(id){
const tag=h.tagName.toLowerCase();
const text=h.textContent;
headings.push({id,tag,text});
}
});
if(headings.length<2){TC.innerHTML='';document.getElementById('tocSidebar').classList.remove('visible');return}
document.getElementById('tocSidebar').classList.add('visible');
let html='<div class="toc-label">'+t('section')+'</div>';
headings.forEach(h=>{
const cls='toc-link '+h.tag;
html+='<a class="'+cls+'" href="#'+h.id+'" onclick="event.preventDefault();document.getElementById(\''+h.id+'\').scrollIntoView({behavior:\'smooth\'});return false">'+h.text+'</a>';
});
TC.innerHTML=html;
// highlight active toc link on scroll
const links=TC.querySelectorAll('.toc-link');
const handleScroll=()=>{
let current='';
const scrollY=window.scrollY+120;
headings.forEach(h=>{
const el=document.getElementById(h.id);
if(el&&el.offsetTop<=scrollY)current=h.id;
});
links.forEach(l=>{l.classList.toggle('active',l.getAttribute('href')==='#'+current)});
};
window.addEventListener('scroll',handleScroll,{passive:true});
}

// ====== NAVIGATION ======
function navigate(pageId){
renderPage(pageId);
// Close mobile sidebar
document.getElementById('sidebar').classList.remove('open');
document.getElementById('sidebarOverlay').classList.remove('open');
}

function toggleSidebar(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ====== SEARCH ======
const searchIndex=[];

function buildSearchIndex(){
searchIndex.length=0;
sidebarSections.forEach(s=>{
s.pages.forEach(p=>{
const en=getContent('en',p.id);
const vi=getContent('vi',p.id);
const sectionLabel=t(s.key);
const pageLabel=lang==='en'?p.labelEN:p.labelVI;
if(en)searchIndex.push({id:p.id,lang:'en',content:en,section:sectionLabel,label:pageLabel});
if(vi)searchIndex.push({id:p.id,lang:'vi',content:vi,section:sectionLabel,label:pageLabel});
});
});
}

function openSearch(){SO.classList.add('open');setTimeout(()=>SMI.focus(),100)}
function closeSearch(){SO.classList.remove('open');SMI.value='';SR.innerHTML='';searchTerm=''}
function searchDocs(e){
if(e&&e.key==='Escape'){closeSearch();return}
const val=SMI.value.toLowerCase().trim();
searchTerm=val;
if(val.length<2){SR.innerHTML='';return}
const results=[];
const textContent=content=>{
const d=document.createElement('div');d.innerHTML=content;
return d.textContent||d.innerText||'';
};
searchIndex.forEach(item=>{
const txt=textContent(item.content).toLowerCase();
const idx=txt.indexOf(val);
if(idx!==-1){
const start=Math.max(0,idx-40);
const end=Math.min(txt.length,idx+val.length+60);
let preview=txt.substring(start,end);
if(start>0)preview='...'+preview;
if(end<txt.length)preview=preview+'...';
results.push({id:item.id,label:item.label,section:item.section,preview});
}
});
results.sort((a,b)=>a.label.localeCompare(b.label));
const seen=new Set();
const unique=results.filter(r=>{const k=r.id+':'+r.label;if(seen.has(k))return false;seen.add(k);return true});
const top=unique.slice(0,20);
SR.innerHTML=top.length?'':('<div style="padding:24px;text-align:center;color:var(--text3);font-size:.9rem">'+h(t('noResults'))+'</div>');
top.forEach(r=>{
const div=document.createElement('div');div.className='search-result';
div.innerHTML='<div class="search-result-title">'+h(r.label)+' <span style="font-weight:400;color:var(--text3);font-size:.8rem">— '+h(r.section)+'</span></div><div class="search-result-preview">'+h(r.preview)+'</div>';
div.onclick=()=>{closeSearch();navigate(r.id)};
SR.appendChild(div);
});
}
// Bind search input
SI.addEventListener('focus',openSearch);
SMI.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch()});
document.addEventListener('keydown',e=>{
if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}
});

// ====== INIT ======
function init(){
// Handle hash navigation
const hash=window.location.hash.slice(1);
const startPage=hash&&sidebarSections.some(s=>s.pages.some(p=>p.id===hash))?hash:'home';
// Ensure content loaded
buildSearchIndex();
renderPage(startPage);
// Add copy buttons to code blocks
document.addEventListener('click',function(e){
const btn=e.target.closest('.copy-btn');
if(btn){
const code=btn.parentElement.querySelector('code');
if(code){navigator.clipboard.writeText(code.textContent);btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy'},1500)}
}
});
}
// Load content and init — wait for content files
if(typeof docsData!=='undefined'&&docsData&&Object.keys(docsData.en.sections).length){
init();
}
</script>
